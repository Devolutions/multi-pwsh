name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell LTS
        uses: ./.github/actions/setup-pwsh
        with:
          version: stable
          github-token: ${{ github.token }}

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy --toolchain stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2.8.2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell LTS
        id: setup-pwsh
        uses: ./.github/actions/setup-pwsh
        with:
          version: stable
          github-token: ${{ github.token }}

      - name: Resolve pwsh executable path
        id: pwsh-exe
        shell: pwsh
        run: |
          $pwshPath = "${{ steps.setup-pwsh.outputs.path }}"
          $exeName = if ($IsWindows) { "pwsh.exe" } else { "pwsh" }
          $exePath = Join-Path $pwshPath $exeName
          "path=$exePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2.8.2

      - name: Configure static MSVC runtime
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          "RUSTFLAGS=-C target-feature=+crt-static" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Rust targets
        run: cargo build --all-targets

      - name: Run Rust tests
        run: cargo test --all-targets

      - name: Build .NET project
        shell: pwsh
        run: dotnet build dotnet/Bindings.csproj -p:PwshExePath="${{ steps.pwsh-exe.outputs.path }}"

      - name: Run .NET tests
        shell: pwsh
        run: dotnet test dotnet/Bindings.csproj --no-build -p:PwshExePath="${{ steps.pwsh-exe.outputs.path }}"
