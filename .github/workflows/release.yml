name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build/publish (for example v0.4.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            host_archive: pwsh-host-linux-x64.zip
            host_binary: pwsh-host
            multi_archive: multi-pwsh-linux-x64.zip
            multi_binary: multi-pwsh

          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            host_archive: pwsh-host-linux-arm64.zip
            host_binary: pwsh-host
            multi_archive: multi-pwsh-linux-arm64.zip
            multi_binary: multi-pwsh

          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            host_archive: pwsh-host-windows-x64.zip
            host_binary: pwsh-host.exe
            multi_archive: multi-pwsh-windows-x64.zip
            multi_binary: multi-pwsh.exe

          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            host_archive: pwsh-host-windows-arm64.zip
            host_binary: pwsh-host.exe
            multi_archive: multi-pwsh-windows-arm64.zip
            multi_binary: multi-pwsh.exe

          - name: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
            host_archive: pwsh-host-macos-x64.zip
            host_binary: pwsh-host
            multi_archive: multi-pwsh-macos-x64.zip
            multi_binary: multi-pwsh

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            host_archive: pwsh-host-macos-arm64.zip
            host_binary: pwsh-host
            multi_archive: multi-pwsh-macos-arm64.zip
            multi_binary: multi-pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup PowerShell LTS
        uses: ./.github/actions/setup-pwsh
        with:
          version: stable
          github-token: ${{ github.token }}

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"
          rustup default stable

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure static MSVC runtime
        if: contains(matrix.target, 'windows-msvc')
        shell: pwsh
        run: |
          "RUSTFLAGS=-C target-feature=+crt-static" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build binaries
        shell: pwsh
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --locked --release --package pwsh-host-cli --bin pwsh-host --target "${{ matrix.target }}"
          cargo build --locked --release --package multi-pwsh --bin multi-pwsh --target "${{ matrix.target }}"

      - name: Package artifacts
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          HOST_BIN_NAME: ${{ matrix.host_binary }}
          HOST_ARCHIVE_NAME: ${{ matrix.host_archive }}
          MULTI_BIN_NAME: ${{ matrix.multi_binary }}
          MULTI_ARCHIVE_NAME: ${{ matrix.multi_archive }}
        run: |
          $target = $env:TARGET
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          function New-BinaryArchive {
            param(
              [string]$BinaryName,
              [string]$ArchiveName
            )

            $binaryPath = [System.IO.Path]::Combine("target", $target, "release", $BinaryName)
            if (-not (Test-Path -Path $binaryPath)) {
              throw "Binary not found: $binaryPath"
            }

            if (Test-Path -Path $ArchiveName) {
              Remove-Item -Path $ArchiveName -Force
            }

            $archive = [System.IO.Compression.ZipFile]::Open($ArchiveName, [System.IO.Compression.ZipArchiveMode]::Create)
            try {
              [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
                $archive,
                $binaryPath,
                $BinaryName,
                [System.IO.Compression.CompressionLevel]::Optimal
              ) | Out-Null
            }
            finally {
              $archive.Dispose()
            }

            Write-Host "Created $ArchiveName"
          }

          New-BinaryArchive -BinaryName $env:HOST_BIN_NAME -ArchiveName $env:HOST_ARCHIVE_NAME
          New-BinaryArchive -BinaryName $env:MULTI_BIN_NAME -ArchiveName $env:MULTI_ARCHIVE_NAME

      - name: Upload pwsh-host artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.host_archive }}
          path: ${{ matrix.host_archive }}
          if-no-files-found: error

      - name: Upload multi-pwsh artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.multi_archive }}
          path: ${{ matrix.multi_archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.event.inputs.tag, 'v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell LTS
        uses: ./.github/actions/setup-pwsh
        with:
          version: stable
          github-token: ${{ github.token }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: pwsh
        working-directory: dist
        run: |
          $zipFiles = Get-ChildItem -Recurse -File |
            Where-Object { $_.Name -like 'pwsh-host-*.zip' -or $_.Name -like 'multi-pwsh-*.zip' } |
            Sort-Object Name

          if (-not $zipFiles) {
            throw 'No release archives found under dist'
          }

          $lines = $zipFiles |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }

          $lines | Set-Content -Path checksums.txt -Encoding utf8
          Get-Content -Path checksums.txt

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          $zipFiles = Get-ChildItem -Path dist -Recurse -File |
            Where-Object { $_.Name -like 'pwsh-host-*.zip' -or $_.Name -like 'multi-pwsh-*.zip' } |
            Sort-Object Name |
            ForEach-Object { $_.FullName }

          if (-not $zipFiles) {
            throw 'No release archives found under dist'
          }

          gh release view "$env:RELEASE_TAG" *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:RELEASE_TAG" @zipFiles "dist/checksums.txt" --clobber
          }
          else {
            $createArgs = @(
              "$env:RELEASE_TAG"
            )

            $createArgs += $zipFiles
            $createArgs += "dist/checksums.txt"
            $createArgs += "--generate-notes"
            $createArgs += "--target"
            $createArgs += "$env:RELEASE_TARGET"

            gh release create @createArgs
          }
